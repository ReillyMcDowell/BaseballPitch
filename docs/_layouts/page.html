---
layout: default
---

<style>
  .flex-layout {
    display: flex;
    flex-wrap: wrap;
    gap: 20px; 
  }

  .main-column {
    flex: 2;
    min-width: 300px; 
  }

  .sidebar-column {
    flex: 1;
    min-width: 250px; 
  }

  /* Hide the mobile toggle button and checkbox on desktop */
  .mobile-toggle-label { display: none; }
  #sidebar-toggle { display: none; }

  /* Mobile-specific layout (activates on screens smaller than 768px) */
  @media (max-width: 768px) {
    .sidebar-column {
      order: -1; /* 1. Moves the sidebar to the very top */
      flex: 100%; /* 2. Forces it to take the full width */
    }
    
    .sidebar-content {
      display: none; /* 3. Hides the sidebar content by default */
    }

    .mobile-toggle-label {
      display: block; /* 4. Shows the clickable dropdown label */
      cursor: pointer;
      font-weight: bold;
      margin-bottom: 10px;
    }

    /* 5. When the invisible checkbox is checked, reveal the content */
    #sidebar-toggle:checked ~ .sidebar-content {
      display: block; 
    }
  }
</style>

<section class="standalone">
  <div class="flex-layout">
    
    <div class="main-column">
      <article>
        {%- if page.permalink contains "resources" %}
        {% include improve_doc_link.html %}
        {% endif -%}
        <h1>{{ page.title }}</h1>
        {{ content }}
      </article>
    </div>

    <aside class="sidebar-column">
      
      <input type="checkbox" id="sidebar-toggle">
      
      <label for="sidebar-toggle" class="mobile-toggle-label">
        Menu ▼
      </label>

      <div class="sidebar-content">
        <h3>Sidebar Header</h3>
        <p>Your sidebar links, widgets, or content go here.</p>
      </div>

    </aside>

  </div>
</section>
